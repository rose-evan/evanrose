<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evan Rose</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #d4d4d4;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 14px;
      line-height: 1.65;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.033) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.055) 2px,
        rgba(0,0,0,0.055) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .terminal {
      position: relative;
      z-index: 1;
      width: min(700px, calc(100vw - 2rem));
      height: min(500px, calc(100vh - 3rem));
      display: flex;
      flex-direction: column;
      background: #111111;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 40px 80px rgba(0,0,0,0.7),
        0 16px 32px rgba(0,0,0,0.4);
      animation: appear 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(18px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* titlebar */
    .titlebar {
      display: flex;
      align-items: center;
      padding: 0.7rem 1rem;
      background: #161616;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
      gap: 6px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }

    .titlebar-label {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #3d3d3d;
      letter-spacing: 0.04em;
    }

    .titlebar-links {
      display: flex;
      gap: 0.6rem;
      font-size: 12px;
    }

    .titlebar-links button,
    .command-chip {
      color: #737373;
      background: none;
      border: none;
      font: inherit;
      cursor: pointer;
    }

    .titlebar-links button:hover,
    .titlebar-links button:focus-visible,
    .command-chip:hover,
    .command-chip:focus-visible {
      color: #d4d4d4;
      outline: none;
    }

    /* scroll area */
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem 0.25rem;
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
    }

    .body::-webkit-scrollbar { width: 3px; }
    .body::-webkit-scrollbar-track { background: transparent; }
    .body::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    /* output lines */
    .line {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0 0.5rem;
      min-height: 1.65em;
      animation: fadeIn 0.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .spacer { height: 0.6rem; }

    .p   { color: #4ade80; flex-shrink: 0; user-select: none; }
    .c   { color: #fb923c; }
    .o   { color: #d4d4d4; width: 100%; }
    .e   { color: #f87171; width: 100%; }

    .o a { color: #60a5fa; text-decoration: none; }
    .o a:hover { text-decoration: underline; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      padding: 0.15rem 0 0.25rem;
    }

    .command-chip {
      color: #d4d4d4;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 0.18rem 0.55rem;
      background: #151515;
    }

    .command-chip::before {
      content: '$ ';
      color: #4ade80;
    }

    .command-chip:hover,
    .command-chip:focus-visible {
      border-color: #3d3d3d;
      background: #1a1a1a;
    }

    /* input row */
    .input-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.5rem 1.25rem;
      flex-shrink: 0;
    }

    .input-ps1 { color: #4ade80; user-select: none; flex-shrink: 0; }

    .input-row input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #d4d4d4;
      font: inherit;
      caret-color: #d4d4d4;
    }

    @media (max-width: 520px) {
      html, body { font-size: 13px; }

      .terminal {
        width: calc(100vw - 1rem);
        height: calc(100vh - 1rem);
      }

      .titlebar {
        padding: 0.65rem 0.8rem;
      }

      .titlebar-label {
        display: none;
      }

      .titlebar-links {
        margin-left: auto;
      }

      .body {
        padding: 1rem 1rem 0.25rem;
      }

      .input-row {
        padding: 0.5rem 1rem 1rem;
      }
    }
  </style>
  <meta name="description" content="Evan Rose">
  <meta name="robots" content="index,follow">
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
      <span class="titlebar-label">evan@rose — ~</span>
      <span class="titlebar-links" aria-label="quick commands">
        <button type="button" data-cmd="about">about</button>
        <button type="button" data-cmd="work">work</button>
        <button type="button" data-cmd="contact">contact</button>
      </span>
    </div>
    <div class="body" id="body">
      <div id="output"></div>
    </div>
    <div class="input-row">
      <span class="input-ps1">evan@rose:~$</span>
      <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus>
    </div>
  </div>

  <script>
  (function () {
    const out   = document.getElementById('output');
    const input = document.getElementById('input');
    const body  = document.getElementById('body');
    const PS1   = 'evan@rose:~$';

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function line(prompt, cmd, content, cls) {
      const el = document.createElement('div');
      el.className = 'line';
      let h = '';
      if (prompt)  h += `<span class="p">${esc(prompt)}</span>`;
      if (cmd)     h += `<span class="c">${esc(cmd)}</span>`;
      if (content) h += `<span class="${cls || 'o'}">${content}</span>`;
      el.innerHTML = h;
      out.appendChild(el);
      body.scrollTop = body.scrollHeight;
    }

    function print(html, cls) { line(null, null, html, cls); }
    function space() {
      const e = document.createElement('div');
      e.className = 'spacer';
      out.appendChild(e);
    }

    const suggestions = [
      ['about', 'who i am'],
      ['work', 'things i have built and worked on'],
      ['projects', 'current interests and project directions'],
      ['why', 'why general purpose robotics'],
      ['contact', 'get in touch'],
      ['links', 'around the web']
    ];

    function commandList(items) {
      space();
      print('learn more:');
      items.forEach(([name, desc]) => {
        print(`  <span class="c">${name}</span>${' '.repeat(Math.max(1, 10 - name.length))}${desc}`);
      });
      space();
    }

    function chips(items) {
      const el = document.createElement('div');
      el.className = 'chips';
      items.forEach(([name]) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'command-chip';
        b.dataset.cmd = name;
        b.textContent = name;
        el.appendChild(b);
      });
      out.appendChild(el);
      body.scrollTop = body.scrollHeight;
    }

    const cmds = {
      help() {
        print('commands:');
        suggestions.forEach(([name, desc]) => {
          print(`  <span class="c">${name}</span>${' '.repeat(Math.max(1, 10 - name.length))}${desc}`);
        });
        print('  <span class="c">clear</span>     clear terminal');
        print('  <span class="c">help</span>      this message');
        space();
      },
      about() {
        space();
        print('<span class="c">who</span>');
        print("i'm evan rose, a builder interested in systems that make");
        print('ambitious technology easier to understand, use, and trust.');
        space();
        print('<span class="c">recently</span>');
        print('i worked on <a href="https://www.build.ai/" target="_blank" rel="noopener">build ai</a> this summer.');
        print('i like careful implementation, deliberate product design,');
        print('and teams that can turn hard ideas into working artifacts.');
        space();
        print('<span class="c">direction</span>');
        print('i think humanity now faces one of its most important projects:');
        print('<span class="c">general purpose robotics.</span>');
        space();
        commandList(suggestions.slice(1, 6));
        chips(suggestions.slice(1, 6));
      },
      work() {
        space();
        print('<span class="c">work</span>');
        print('build ai — worked on software for making AI-built apps feel');
        print('more practical, legible, and useful to real people.');
        space();
        print('i care about the craft layer: interfaces, reliability,');
        print('iteration speed, and the small details that make tools usable.');
        space();
        print('try <span class="c">projects</span> for what i want to explore next.');
        space();
      },
      projects() {
        space();
        print('<span class="c">projects</span>');
        print('current directions i want to spend more time on:');
        print('  - AI tools that help people build and understand software');
        print('  - robotics interfaces that expose intent, state, and limits');
        print('  - collaborative systems for turning research into products');
        space();
        print('try <span class="c">why</span> for the longer-term motivation.');
        space();
      },
      why() {
        space();
        print('<span class="c">why robotics</span>');
        print('general purpose robotics is where software starts acting');
        print('directly on the physical world.');
        space();
        print('that makes safe deployment and careful implementation');
        print('as important as raw capability.');
        space();
        print('i want to help build systems that are useful, legible,');
        print('and reliable enough to earn trust in the real world.');
        space();
      },
      contact() {
        space();
        print('<a href="mailto:evanrose@ucla.edu">evanrose@ucla.edu</a>');
        space();
      },
      links() {
        space();
        print('<a href="https://x.com/evanr0se" target="_blank" rel="noopener">x.com/evanr0se</a>');
        print('<a href="https://www.linkedin.com/in/evanucla/" target="_blank" rel="noopener">linkedin.com/in/evanucla</a>');
        space();
      },
      clear() {
        out.innerHTML = '';
      },
      resume() { cmds.work(); },
      build() { cmds.work(); },
      robotics() { cmds.why(); },
      email() { cmds.contact(); },
      twitter() { cmds.links(); },
      x() { cmds.links(); },
      linkedin() { cmds.links(); },
      github() { cmds.links(); },
      whoami() { print('evan rose'); },
      date()   { print(new Date().toLocaleString()); },
      echo(args) { if (args.length) print(esc(args.join(' '))); },
      sudo() {
        space();
        print('evan is not in the sudoers file.', 'e');
        print('this incident will be reported.', 'e');
        space();
      },
    };

    function run(raw) {
      const parts = raw.trim().split(/\s+/);
      const cmd = parts[0].toLowerCase();
      const args = parts.slice(1);
      if (!cmd) return;
      line(PS1, cmd + (args.length ? ' ' + args.join(' ') : ''));
      if (cmds[cmd]) {
        cmds[cmd](args);
      } else {
        space();
        print(`command not found: <span class="c">${esc(cmd)}</span>`, 'e');
        commandList(suggestions);
        chips(suggestions);
        space();
      }
    }

    /* history */
    const hist = [];
    let hi = -1;

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const v = input.value;
        input.value = '';
        hi = -1;
        if (v.trim()) hist.unshift(v);
        run(v);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (hi < hist.length - 1) input.value = hist[++hi];
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        hi > 0 ? (input.value = hist[--hi]) : (hi = -1, input.value = '');
      } else if (e.key === 'Tab') {
        e.preventDefault();
        const v = input.value.toLowerCase().trim();
        if (!v) return;
        const match = Object.keys(cmds).find(k => k.startsWith(v));
        if (match) input.value = match;
      }
    });

    document.addEventListener('click', e => {
      const target = e.target.closest('[data-cmd]');
      if (target) {
        run(target.dataset.cmd);
        input.value = '';
      }
      input.focus();
    });

    /* auto-type intro */
    function typeCmd(cmd, cb) {
      let i = 0;
      input.value = '';
      const t = setInterval(() => {
        input.value += cmd[i++];
        if (i >= cmd.length) {
          clearInterval(t);
          setTimeout(() => { run(cmd); input.value = ''; cb && cb(); }, 240);
        }
      }, 55);
    }

    setTimeout(() => typeCmd('about'), 700);
  })();
  </script>
</body>
</html>
